[pytest]
# Hospital Appointment Management System — Pytest Configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers
markers =
    auth: Authentication tests
    doctor: Doctor management tests
    patient: Patient management tests
    appointment: Appointment system tests
    integration: Integration tests that test multiple components
