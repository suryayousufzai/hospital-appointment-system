{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div style="font-size:5rem;font-family:'DM Serif Display',serif;color:var(--danger);opacity:.2;line-height:1;">
    500
  </div>
  <i class="bi bi-exclamation-triangle display-3 text-danger mt-2 d-block"></i>
  <h3 class="mt-3">Something Went Wrong</h3>
  <p class="text-muted">An unexpected error occurred on the server. Please try again later.</p>
  <a href="{{ url_for('auth.index') }}" class="btn btn-primary mt-2 px-4">
    <i class="bi bi-house me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
