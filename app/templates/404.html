{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div style="font-size:5rem;font-family:'DM Serif Display',serif;color:var(--primary);opacity:.2;line-height:1;">
    404
  </div>
  <i class="bi bi-search display-3 text-muted mt-2 d-block"></i>
  <h3 class="mt-3">Page Not Found</h3>
  <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('auth.index') }}" class="btn btn-primary mt-2 px-4">
    <i class="bi bi-house me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
